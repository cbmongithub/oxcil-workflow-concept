            - button "What is Oxcil in V1?" [ref=e823]:
              - generic [ref=e824]: What is Oxcil in V1?
              - img [ref=e825]
            - paragraph [ref=e829]: Oxcil is a workflow operator console. A user describes operational work, Oxcil resolves it to a workflow, runs it across existing systems, streams progress, and saves the result for reuse.
          - generic [ref=e830]:
            - button "Is this a chatbot?" [ref=e831]:
              - generic [ref=e832]: Is this a chatbot?
              - img [ref=e833]
            - paragraph [ref=e835]: No. Chat can be the input, but the product value is execution, observability, approvals, artifacts, and repeatable workflows.
          - generic [ref=e836]:
            - button "Why API-first and browser-second?" [ref=e837]:
              - generic [ref=e838]: Why API-first and browser-second?
              - img [ref=e839]
            - paragraph [ref=e841]: Official APIs are more reliable, cheaper, and easier to observe. Browser automation remains available for legacy portals, but it should stay isolated behind task-level tools.
          - generic [ref=e842]:
            - button "What workflows should ship first?" [ref=e843]:
              - generic [ref=e844]: What workflows should ship first?
              - img [ref=e845]
            - paragraph [ref=e847]: "The baseline docs point V1 toward home-services office workflows: daily lead summary, tomorrow's appointment verification, unassigned job checks, ops digests, and follow-up queues."
          - generic [ref=e848]:
            - button "Where does AI belong?" [ref=e849]:
              - generic [ref=e850]: Where does AI belong?
              - img [ref=e851]
            - paragraph [ref=e853]: "AI should sit inside a deterministic product system: structured planning, typed tool calls, schema-validated outputs, cost visibility, and human approval where risk exists."
          - generic [ref=e854]:
            - button "What is intentionally out of scope?" [ref=e855]:
              - generic [ref=e856]: What is intentionally out of scope?
              - img [ref=e857]
            - paragraph [ref=e859]: V1 should avoid marketplace, broad no-code authoring, multi-user collaboration, voice, arbitrary desktop automation, and a horizontal launch before one niche is validated.
