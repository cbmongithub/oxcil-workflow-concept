            - button "What is Oxcil in V1?" [ref=e773]:
              - generic [ref=e774]: What is Oxcil in V1?
              - img [ref=e775]
            - paragraph [ref=e779]: Oxcil is a workflow operator console. A user describes operational work, Oxcil resolves it to a workflow, runs it across existing systems, streams progress, and saves the result for reuse.
          - generic [ref=e780]:
            - button "Is this a chatbot?" [ref=e781]:
              - generic [ref=e782]: Is this a chatbot?
              - img [ref=e783]
            - paragraph [ref=e785]: No. Chat can be the input, but the product value is execution, observability, approvals, artifacts, and repeatable workflows.
          - generic [ref=e786]:
            - button "Why API-first and browser-second?" [ref=e787]:
              - generic [ref=e788]: Why API-first and browser-second?
              - img [ref=e789]
            - paragraph [ref=e791]: Official APIs are more reliable, cheaper, and easier to observe. Browser automation remains available for legacy portals, but it should stay isolated behind task-level tools.
          - generic [ref=e792]:
            - button "What workflows should ship first?" [ref=e793]:
              - generic [ref=e794]: What workflows should ship first?
              - img [ref=e795]
            - paragraph [ref=e797]: "The baseline docs point V1 toward home-services office workflows: daily lead summary, tomorrow's appointment verification, unassigned job checks, ops digests, and follow-up queues."
          - generic [ref=e798]:
            - button "Where does AI belong?" [ref=e799]:
              - generic [ref=e800]: Where does AI belong?
              - img [ref=e801]
            - paragraph [ref=e803]: "AI should sit inside a deterministic product system: structured planning, typed tool calls, schema-validated outputs, cost visibility, and human approval where risk exists."
          - generic [ref=e804]:
            - button "What is intentionally out of scope?" [ref=e805]:
              - generic [ref=e806]: What is intentionally out of scope?
              - img [ref=e807]
            - paragraph [ref=e809]: V1 should avoid marketplace, broad no-code authoring, multi-user collaboration, voice, arbitrary desktop automation, and a horizontal launch before one niche is validated.
